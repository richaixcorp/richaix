// ── CLOCK ──────────────────────────────────────────
function updateClock(){
  const n=new Date();
  const p=x=>x.toString().padStart(2,'0');
  clock.textContent=`${n.getUTCFullYear()}-${p(n.getUTCMonth()+1)}-${p(n.getUTCDate())} // ${p(n.getUTCHours())}:${p(n.getUTCMinutes())}:${p(n.getUTCSeconds())} UTC // RICHAIX CONSENSUS ENGINE v1.0`;
}

// ── AUDIO ──────────────────────────────────────────
let AC=null;
function initAudio(){
  if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(AC&&AC.state==='suspended')AC.resume();
}
function beep(type){
  if(!AC||AC.state!=='running')return;
  const n=AC.currentTime;
  if(type==='key'){
    const g=AC.createGain();g.gain.setValueAtTime(.06,n);g.gain.exponentialRampToValueAtTime(.001,n+.08);g.connect(AC.destination);
    const o=AC.createOscillator();o.type='square';o.frequency.setValueAtTime(1000+Math.random()*400,n);o.connect(g);o.start(n);o.stop(n+.08);
  }else if(type==='ok'){
    const g=AC.createGain();g.gain.setValueAtTime(.15,n);g.gain.exponentialRampToValueAtTime(.001,n+.4);g.connect(AC.destination);
    const o=AC.createOscillator();o.type='sine';o.frequency.setValueAtTime(660,n);o.frequency.exponentialRampToValueAtTime(880,n+.2);o.connect(g);o.start(n);o.stop(n+.4);
  }else if(type==='scan'){
    const src=AC.createBufferSource();const sz=AC.sampleRate*.4;const buf=AC.createBuffer(1,sz,AC.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<sz;i++)d[i]=Math.random()*2-1;
    src.buffer=buf;src.loop=true;
    const f=AC.createBiquadFilter();f.type='bandpass';f.frequency.value=1400;f.Q.value=20;
    const g=AC.createGain();g.gain.value=.03;src.connect(f);f.connect(g);g.connect(AC.destination);src.start(n);
    return src;
  }
}
document.addEventListener('click',()=>initAudio(),{once:true});

// ── HELPERS ────────────────────────────────────────
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

function addLine(text,cls=''){
  const p=document.createElement('p');
  if(cls)p.className=cls;
  p.innerHTML=text;
  log.appendChild(p);
  main.scrollTop=main.scrollHeight;
}

async function type(text,speed=18,cls=''){
  const p=document.createElement('p');
  if(cls)p.className=cls;
  log.appendChild(p);
  for(let i=0;i<text.length;i++){
    p.innerHTML=text.substring(0,i+1);
    if(i%4===0&&text.length>8)beep('key');
    main.scrollTop=main.scrollHeight;
    await sleep(speed);
  }
}

async function progress(label){
  const p=document.createElement('p');log.appendChild(p);
  const src=beep('scan');
  const steps=40;
  for(let i=0;i<=steps;i++){
    const bar='█'.repeat(i)+'-'.repeat(steps-i);
    const h=(Math.random()+1).toString(36).substring(2,10).toUpperCase();
    p.innerHTML=`> ${label}: [${bar}] <span class="dim">${h}</span>`;
    main.scrollTop=main.scrollHeight;
    await sleep(35);
  }
  if(src)src.stop();
  beep('ok');
  p.innerHTML=`> ${label}: [${'█'.repeat(steps)}] <span class="ok">VERIFIED ✓</span>`;
  await sleep(200);
}
